name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # This gate catches script and patch regressions before the expensive release workflow runs.
      - name: Validate Python sources
        run: python -m py_compile build_release.py patches/momogram.py patches/v2rayng-no-ads.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Load project configuration
        run: python build_release.py --list
