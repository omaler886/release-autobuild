name: Sync Verify And Build XHTTP

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - xhttp
    paths-ignore:
      - "README.md"
      - "PATCH_NOTES.md"
      - ".github/upstream-tracking.env"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  sync_verify:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      branch_changed: ${{ steps.sync.outputs.branch_changed }}
      donor_changed: ${{ steps.sync.outputs.donor_changed }}
    steps:
      - name: Checkout xhttp
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          ref: xhttp
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream mirrors and tracking
        id: sync
        shell: bash
        run: .github/sync-upstreams.sh

      - name: Verify merged xhttp branch
        shell: bash
        run: .github/verify-xhttp.sh

      - name: Push mirrored upstream branches
        shell: bash
        run: |
          git push origin refs/heads/upstream-testing:refs/heads/upstream-testing --force
          git push origin refs/heads/upstream-yelnoo-stable:refs/heads/upstream-yelnoo-stable --force
          git push origin refs/heads/upstream-mihomo-splithttp:refs/heads/upstream-mihomo-splithttp --force

      - name: Push xhttp branch
        if: steps.sync.outputs.branch_changed == 'true'
        shell: bash
        run: git push origin xhttp

  build:
    needs:
      - sync_verify
    if: ${{ github.event_name == 'push' || needs.sync_verify.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }

    steps:
      - name: Checkout xhttp
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          ref: xhttp
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.8"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="xhttp-$(date -u +'%Y%m%d')-${GITHUB_SHA::7}"
          if [ "$GOOS" = "windows" ]; then
            TAGS="$(cat release/DEFAULT_BUILD_TAGS_WINDOWS)"
            EXT=".exe"
          else
            TAGS="$(cat release/DEFAULT_BUILD_TAGS_OTHERS)"
            EXT=""
          fi
          LDFLAGS_SHARED="$(cat release/LDFLAGS)"
          mkdir -p dist
          CGO_ENABLED=0 go build -trimpath \
            -o "dist/sbx-xhttp-${GOOS}-${GOARCH}${EXT}" \
            -tags "$TAGS" \
            -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${VERSION}' ${LDFLAGS_SHARED} -s -w -buildid=" \
            ./cmd/sing-box

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbx-xhttp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
