name: build-github-source-pool

on:
  workflow_dispatch:
  schedule:
    - cron: '17 2 * * *'

permissions:
  contents: write

concurrency:
  group: build-github-source-pool
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Search GitHub for extra candidate repos and files
        env:
          GH_API_TOKEN: ${{ github.token }}
        run: |
          python scripts/search_github_candidates.py \
            --queries-file config/search_queries.yaml \
            --output-repo-file published/manifests/search-discovered-repos.txt \
            --output-source-file published/manifests/search-discovered-source-urls.txt \
            --meta-file published/manifests/search-summary.json

      - name: Discover extra GitHub source URLs
        env:
          GH_API_TOKEN: ${{ github.token }}
        run: |
          python scripts/discover_github_sources.py \
            --seed-repo-file config/github_seed_repos.txt \
            --seed-repo-file published/manifests/search-discovered-repos.txt \
            --patterns-file config/discovery_patterns.yaml \
            --output-file published/manifests/discovered-source-urls.txt \
            --meta-file published/manifests/discovery-summary.json

      - name: Build GitHub source raw pool
        run: |
          python scripts/build_github_source_pool.py \
            --source-url-file config/github_source_urls.txt \
            --extra-source-url-file published/manifests/search-discovered-source-urls.txt \
            --extra-source-url-file published/manifests/discovered-source-urls.txt \
            --output-dir published

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v6
        with:
          name: github-source-raw-pool
          path: |
            published/pools
            published/manifests

      - name: Commit refreshed artifacts
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add published
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh GitHub source raw pool"
          git push
